version: '3.9'

services:
    app:
        build: .
        ports:
            - "3000:3000"
        depends_on:
            - n8n
        env_file:
            - .env
    n8n:
        image: n8nio/n8n
        ports:
            - "5678:5678"
        volumes:
            - /home/zaiyan/n8n_data:/home/node/.n8n